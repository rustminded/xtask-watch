name: Rust

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        rust:
          - stable
          - msrv
        include:
          - os: ubuntu-latest
            rust: msrv
            lint: 1
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install toolchain
        shell: bash
        run: |
          ver="${{ matrix.rust }}"
          if [ "$ver" = msrv ]; then
              ver=$(cargo metadata --format-version 1 --no-deps | \
                  jq -r '.packages[0].rust_version')
              extra=(-c rustfmt -c clippy)
          fi
          rustup toolchain install "$ver" --profile minimal --no-self-update "${extra[@]}"
          rustup default "$ver"
          echo "Installed:"
          cargo --version
          rustc --version --verbose


      - name: cargo test (anyhow)
        run: cargo test

      - name: cargo test (eyre)
        run: cargo test --no-default-features --features eyre

      - name: rustfmt
        if: github.event_name == 'pull_request' && matrix.lint
        run: cargo fmt --all -- --check

      - name: clippy (anyhow)
        if: github.event_name == 'pull_request' && matrix.lint
        run: cargo clippy --all --tests -- -D warnings

      - name: clippy (eyre)
        if: github.event_name == 'pull_request' && matrix.lint
        run: cargo clippy --all --tests --no-default-features --features eyre -- -D warnings
